<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      #pulseRect {
        position: absolute;
        display: none;
        border: 4px solid rgba(123, 97, 255, 0.95);
        border-radius: 8px;
        box-shadow:
          0 0 0 2px rgba(123, 97, 255, 0.8) inset,
          0 0 24px rgba(123, 97, 255, 0.75);
        animation: pulse 0.55s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.015);
        }
      }
    </style>
  </head>
  <body>
    <div id="pulseRect"></div>
    <script src="./alertOverlay.js"></script>
  </body>
</html>
