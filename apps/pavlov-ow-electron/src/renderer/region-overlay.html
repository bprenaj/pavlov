<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Region</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.68);
        cursor: crosshair;
        font-family: "Segoe UI", sans-serif;
      }

      #overlayCanvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .hint {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        color: #f2f7ff;
        text-align: center;
        pointer-events: none;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      }

      .hint.main {
        top: 44%;
        font-size: 30px;
        font-weight: 700;
      }

      .hint.sub {
        top: 52%;
        font-size: 17px;
        color: #7fd9ff;
      }
    </style>
  </head>
  <body>
    <canvas id="overlayCanvas"></canvas>
    <div class="hint main">Click and drag to select the minimap region</div>
    <div class="hint sub">Press ENTER to confirm or ESC to cancel</div>
    <script src="./regionOverlay.js"></script>
  </body>
</html>
