<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MapSense Alert</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
    }
    .flash {
      position: fixed;
      inset: 0;
      background: rgba(255, 82, 82, 0.25);
      animation: alertPulse 0.6s ease-in-out infinite;
      display: none;
      pointer-events: none;
    }
    .flash.active { display: block; }
    @keyframes alertPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.45; }
    }
  </style>
</head>
<body>
  <div id="flash" class="flash"></div>
  <script src="alertOverlay.js"></script>
</body>
</html>
