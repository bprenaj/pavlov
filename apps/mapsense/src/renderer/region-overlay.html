<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Region</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair; user-select: none; }
    body { background: rgba(0,0,0,0.4); }
    #selection {
      display: none; position: absolute;
      border: 2px solid #7B61FF; background: rgba(123,97,255,0.15);
      pointer-events: none; z-index: 10;
    }
    #hint {
      position: fixed; left: 0; right: 0; top: 50%; transform: translateY(-50%);
      text-align: center; font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6f1ff; font-size: 18px; font-weight: 700; z-index: 5;
      pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    #hintSub { margin-top: 12px; font-size: 14px; font-weight: 600; color: #7B61FF; }
    kbd { font-family: inherit; font-size: 12px; padding: 2px 6px; border-radius: 3px; background: rgba(123,97,255,0.25); }
  </style>
</head>
<body>
  <div id="selection"></div>
  <div id="hint">
    <span id="hintMain">Click and drag to select the minimap region</span>
    <div id="hintSub" style="display:none;">Press <kbd>ENTER</kbd> to confirm &nbsp;|&nbsp; <kbd>ESC</kbd> to cancel</div>
  </div>
  <script src="regionOverlay.js"></script>
</body>
</html>
