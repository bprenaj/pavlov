name: Tests

# CI gate: typecheck, lint, and the full test suite on every push and PR.
on:
  push:
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/pavlov-ow-electron-opus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/pavlov-ow-electron-opus/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
