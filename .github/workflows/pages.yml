name: Deploy Site

# Publishes site/ to Cloudflare Pages (project: pavlov) whenever the site
# changes on main, and keeps the custom domain wired up:
#   - ensures the Pages project exists
#   - deploys site/
#   - attaches getmapsense.com and www.getmapsense.com to the project
#   - creates the CNAME records in the zone (domain is registered on
#     Cloudflare, so the zone lives in the same account)
# Every step is idempotent, so re-runs are safe.
#
# The page itself queries the GitHub Releases API in the browser, so new
# stable and beta builds appear on it without a redeploy.
#
# One-time setup (docs/ci-cd.md): repo secrets CLOUDFLARE_API_TOKEN
# (Pages:Edit + Zone:Read + DNS:Edit for getmapsense.com) and
# CLOUDFLARE_ACCOUNT_ID. Until those exist this workflow skips the deploy
# instead of failing.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

env:
  PROJECT: pavlov
  SITE_DOMAIN: getmapsense.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare credentials
        id: cf
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets are not set; skipping deploy. See docs/ci-cd.md."
          fi

      - uses: actions/checkout@v4
        if: steps.cf.outputs.configured == 'true'

      - name: Ensure Pages project exists
        if: steps.cf.outputs.configured == 'true'
        run: |
          BODY=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"$PROJECT\",\"production_branch\":\"main\"}")
          if echo "$BODY" | jq -e '.success' > /dev/null; then
            echo "Created Pages project $PROJECT"
          else
            # Already-exists is the normal case after the first run.
            echo "Project create response: $(echo "$BODY" | jq -c '.errors')"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=pavlov

      - name: Attach custom domain and DNS
        if: steps.cf.outputs.configured == 'true'
        run: |
          api() {
            local method="$1" path="$2"; shift 2
            curl -s -X "$method" "https://api.cloudflare.com/client/v4$path" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" "$@"
          }

          ZONE_ID=$(api GET "/zones?name=$SITE_DOMAIN" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Zone $SITE_DOMAIN not visible to this token (needs Zone:Read + DNS:Edit). Domain not attached; site is still live at $PROJECT.pages.dev."
            exit 0
          fi

          for HOST in "$SITE_DOMAIN" "www.$SITE_DOMAIN"; do
            # Attach the hostname to the Pages project (already-attached is fine).
            RESP=$(api POST "/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
              --data "{\"name\":\"$HOST\"}")
            if echo "$RESP" | jq -e '.success' > /dev/null; then
              echo "Attached $HOST to Pages project $PROJECT"
            else
              echo "Domain attach response for $HOST: $(echo "$RESP" | jq -c '.errors')"
            fi

            # Point DNS at the Pages deployment. Never clobber an existing
            # record that points somewhere else; warn instead.
            EXISTING=$(api GET "/zones/$ZONE_ID/dns_records?name=$HOST" | jq -r '.result[0].content // empty')
            if [ -z "$EXISTING" ]; then
              api POST "/zones/$ZONE_ID/dns_records" \
                --data "{\"type\":\"CNAME\",\"name\":\"$HOST\",\"content\":\"$PROJECT.pages.dev\",\"proxied\":true}" \
                | jq -c '{success, errors}'
              echo "Created CNAME $HOST -> $PROJECT.pages.dev"
            elif [ "$EXISTING" = "$PROJECT.pages.dev" ]; then
              echo "DNS for $HOST already points at $PROJECT.pages.dev"
            else
              echo "::warning::DNS record for $HOST already exists (-> $EXISTING); left untouched."
            fi
          done
