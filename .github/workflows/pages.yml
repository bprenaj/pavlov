name: Deploy Site

# Publishes site/ to Cloudflare Pages (project: pavlov) whenever the site
# changes on main. The page itself queries the GitHub Releases API in the
# browser, so new stable and beta builds appear on it without a redeploy.
#
# One-time setup (docs/ci-cd.md):
#   1. wrangler pages project create pavlov (or create it in the dashboard)
#   2. Repo secrets: CLOUDFLARE_API_TOKEN (Pages edit scope), CLOUDFLARE_ACCOUNT_ID
# Until those secrets exist this workflow skips the deploy instead of failing.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare credentials
        id: cf
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets are not set; skipping deploy. See docs/ci-cd.md."
          fi
      - uses: actions/checkout@v4
        if: steps.cf.outputs.configured == 'true'
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=pavlov
